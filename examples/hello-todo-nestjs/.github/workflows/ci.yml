name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: examples/hello-todo-nestjs/package-lock.json

      - name: install dependencies
        working-directory: examples/hello-todo-nestjs
        run: npm ci

      - name: run tests
        working-directory: examples/hello-todo-nestjs
        run: npm test

      - name: build
        working-directory: examples/hello-todo-nestjs
        run: npm run build
