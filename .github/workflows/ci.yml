# Action versions verified 2026-05-15. Renovate/Dependabot will keep them current.
name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-shell:
    name: Lint shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"

  lint-markdown:
    name: Lint Markdown (markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            *.md
            workflow/**/*.md
            stacks/**/*.md
            standards/**/*.md
            code-architectures/**/*.md
            project-templates/**/*.md
            project-files/**/*.md
            templates/**/*.md
            examples/**/*.md
            docs/**/*.md

  lint-actions:
    name: Lint GitHub Actions (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        # actionlint is distributed as a Go binary; rhysd doesn't ship a
        # standalone marketplace action. Use the reviewdog wrapper which
        # downloads the binary and runs it.
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  verify-example:
    name: Verify example project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Run verify-example.sh
        run: ./scripts/verify-example.sh

  selftest-go:
    name: Self-test Go stacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Run selftest for Go stacks
        run: ./scripts/selftest.sh --stacks go-gin-layered,go-gin-clean,go-gin-hexagonal

  selftest-rust:
    name: Self-test Rust stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run selftest for Rust stack
        run: ./scripts/selftest.sh --stacks rust-axum-hexagonal

  verify-example-rust:
    name: Verify hello-todo-rust example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run verify-example for hello-todo-rust
        run: ./scripts/verify-example.sh --example hello-todo-rust

  smoke-npm-wrapper:
    name: Smoke-test npm create wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Syntax + help
        run: |
          node --check npm/create-ai-engineering-system/bin/create.mjs
          node npm/create-ai-engineering-system/bin/create.mjs --help
      - name: Bootstrap a project via the wrapper (local system)
        env:
          AI_ENG_SYSTEM_HOME: ${{ github.workspace }}
        run: |
          node npm/create-ai-engineering-system/bin/create.mjs \
            --name smoke \
            --stack go-gin-hexagonal \
            --agent claude \
            --target /tmp/wrapper-smoke \
            --no-git
      - name: Verify the generated project builds + tests pass
        working-directory: /tmp/wrapper-smoke
        run: |
          make setup
          make test
