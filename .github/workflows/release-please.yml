# Action versions verified 2026-05-15. Renovate/Dependabot will keep them current.
# googleapis/release-please-action is pinned below; Renovate will update the SHA.
name: Release Please

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        # verify latest: https://github.com/googleapis/release-please-action/releases
        # Config + manifest live at the repo root so release-please reads the
        # current version (0.0.1 baseline) and bumps semver from there.
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
