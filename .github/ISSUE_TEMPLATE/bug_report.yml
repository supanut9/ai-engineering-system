name: Bug report
description: Report a bug in the AI Engineering System.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        If you are reporting a **security vulnerability**, please do not open a public issue.
        Use [private vulnerability reporting](../security/advisories/new) instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
      placeholder: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the issue.
      placeholder: |
        1. Run `./scripts/init-project.sh ...`
        2. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: System version
      description: Version of ai-engineering-system you are using.
      placeholder: "0.0.1"
    validations:
      required: false

  - type: dropdown
    id: stack
    attributes:
      label: Stack affected
      description: Which stack profile is involved, if any?
      options:
        - go-gin-layered
        - go-gin-clean
        - go-gin-hexagonal
        - nestjs-layered
        - nextjs-default
        - system itself
        - n/a
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Go/Node version, and any other relevant context.
      placeholder: |
        OS: macOS 14.5
        Shell: zsh 5.9
        Go: 1.23.0
    validations:
      required: false

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
