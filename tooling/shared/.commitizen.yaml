# .commitizen.yaml
# Interactive commit helper configuration for commitizen.
# Install: pip install commitizen  OR  npm install -g commitizen
# Usage:   cz commit  (interactive)  or  git cz  (after `npm run prepare`)
#
# Requires commitizen >= 4.3.1

commitizen:
  # Use the conventional-commits adapter (cz-conventional-changelog compatible).
  name: cz_conventional_commits

  # Tag prefix written by `cz bump`.
  tag_format: "v$version"

  # Version source — commitizen reads and writes this file when bumping.
  # Adjust to match your project (pyproject.toml, package.json, VERSION, etc.).
  version_scheme: semver
  version_provider: commitizen  # uses the [tool.commitizen] table in pyproject.toml
                                 # or the "version" key in package.json
                                 # Change to `cargo` for Rust projects.

  # Bump rules follow Conventional Commits:
  #   feat  → MINOR bump
  #   fix   → PATCH bump
  #   BREAKING CHANGE footer or !  → MAJOR bump
  bump_message: "chore(release): $current_version → $new_version"

  # Update CHANGELOG.md on `cz bump`.
  update_changelog_on_bump: true

  # Changelog sections visible in generated output.
  changelog_incremental: true
