# .pre-commit-config.shared.yaml
# Language-agnostic baseline hooks for the pre-commit framework.
# Install:  pip install pre-commit  (or `uv tool install pre-commit`)
# Usage:    cp this file to your project root as `.pre-commit-config.yaml`
#           then run:  pre-commit install
#
# If you already have a language-specific config, merge the `repos` list below
# into it rather than replacing it.
#
# pre-commit framework version: >= 4.6.0

repos:
  # --- basic hygiene (pre-commit built-ins) ----------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0  # verify latest: https://github.com/pre-commit/pre-commit-hooks/releases
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks

  # --- YAML validation -------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0  # verify latest: https://github.com/adrienverge/yamllint/releases
    hooks:
      - id: yamllint
        args: [-d, relaxed]

  # --- TOML validation -------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml

  # --- JSON validation -------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
        # Excludes .jsonc files (JSON with comments) which are not strict JSON.
        exclude: \.jsonc$

  # --- secret scanning (gitleaks) --------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2  # verify latest: https://github.com/gitleaks/gitleaks/releases
    hooks:
      - id: gitleaks

  # --- conventional commit message lint (optional — remove if not used) ------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0  # verify latest: https://github.com/compilerla/conventional-pre-commit/releases
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []  # pass --optional to allow non-conventional commits (not recommended)
